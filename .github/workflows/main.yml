name: CI/CD Python Packaging

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ main ]

jobs:

  lint_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pylint radon black build twine

    - name: Lint
      run: |
        pylint --fail-under=9.0 src/calculator

    - name: Run tests
      run: |
        pytest -v --cov=calculator --cov-report=term-missing

    - name: Check formatting
      run: |
        black --check src/ tests/

  metrics:
    runs-on: ubuntu-latest
    needs: lint_test

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install radon
      run: |
        python -m pip install --upgrade pip
        pip install radon

    - name: Run metrics
      run: |
        radon cc -s -a src/
        radon mi -s src/

  build:
    runs-on: ubuntu-latest
    needs: lint_test

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build package
      run: |
        python -m pip install --upgrade pip
        pip install build
        python -m build

    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/*